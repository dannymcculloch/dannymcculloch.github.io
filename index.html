<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f9f9f9;
            color: #333;
            padding: 50px 20px;
        }
        /* Layout for the three images side-by-side */
        .image-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .image-row img {
            width: 150px; /* Adjust size as needed */
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
        /* Making the profile picture stand out (circular) */
        .image-row img.profile-pic {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 3px solid #333;
        }
        .links-container {
            margin-top: 30px;
        }
        .asset-link {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.2s;
        }
        .asset-link:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Page</h1>

    <div class="image-row">
        <img src="image.png" alt="Left Image">
        <img src="assets/profile.jpg" class="profile-pic" alt="My Profile Picture">
        <img src="image2.png" alt="Right Image">
    </div>

    <p>Hi there! Check out some of my assets below.</p>

    <div class="links-container">
        <a href="resume.pdf" class="asset-link" target="_blank">View Resume</a>
        <a href="project-data.zip" class="asset-link">Download Data Asset</a>
    </div>

</body>
</html>
